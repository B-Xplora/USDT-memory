<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Blockchain Explorer</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono&display=swap');
    :root {
      --brand: #2563eb;
    }
    body { 
      font-family: 'Inter', sans-serif; 
      background: #f8fafc; 
      color: #0f172a; 
    }
    .font-mono { font-family: 'Space Mono', monospace; }
    :focus { outline: 3px solid rgba(37,99,235,0.3); outline-offset: 2px; }
  </style>
</head>
<body class="min-h-screen">

  <div id="app" class="min-h-screen flex flex-col">
    <!-- Header with Live Prices -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
      <div class="container mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <i data-lucide="box" class="text-[var(--brand)] w-7 h-7"></i>
          <div>
            <span class="font-bold text-xl">BlockVista</span>
            <div class="text-xs text-gray-400">Blockchain Explorer</div>
          </div>
        </div>

        <div class="flex items-center gap-6 text-sm">
          <div id="price-btc" class="flex items-center gap-1.5 font-mono"></div>
          <div id="price-usdt" class="flex items-center gap-1.5 font-mono"></div>
          
          <nav class="flex items-center gap-5">
            <a href="#" class="text-gray-600 hover:text-[var(--brand)] transition">Explorer</a>
            <a href="#" class="text-gray-600 hover:text-[var(--brand)] transition">Markets</a>
            <button id="signin" 
                    class="bg-black text-white px-5 py-2 rounded-xl text-sm font-medium hover:bg-gray-800 transition">
              Sign In
            </button>
          </nav>
        </div>
      </div>
    </header>

    <!-- Main -->
    <main class="container mx-auto px-4 py-12 flex-1">
      <section class="text-center max-w-3xl mx-auto">
        <span class="inline-block bg-blue-50 text-blue-700 text-xs font-bold px-4 py-1.5 rounded-full uppercase tracking-wider">
          Live • Multi-Chain
        </span>
        <h1 class="text-5xl font-extrabold mt-6 mb-3 tracking-tighter">
          Explore the <span class="text-[var(--brand)]">Blockchain</span>
        </h1>
        <p class="text-gray-600 text-lg">Search addresses, transactions, and blocks across major networks.</p>

        <form id="search-form" class="max-w-2xl mx-auto mt-10" novalidate>
          <div class="relative bg-white rounded-2xl shadow border border-gray-200 p-2 flex items-center">
            <div class="pl-4 text-gray-400">
              <i data-lucide="search" class="w-5 h-5"></i>
            </div>
            <input
              id="address-input"
              class="flex-1 px-4 py-4 text-lg outline-none font-mono bg-transparent"
              type="search"
              placeholder="Enter address or transaction hash (BTC, ETH, TRON...)"
              autocomplete="off"
            />
            <button type="submit" 
                    class="bg-[var(--brand)] hover:bg-blue-700 text-white px-8 py-4 rounded-xl transition font-medium">
              Search
            </button>
          </div>
          <p id="search-error" class="text-rose-600 text-sm mt-3 hidden"></p>
        </form>
      </section>

      <!-- Loading -->
      <section id="loading-section" class="hidden fixed inset-0 bg-white/95 backdrop-blur z-50 flex items-center justify-center">
        <div class="text-center">
          <div class="w-16 h-16 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin mx-auto mb-6"></div>
          <h3 id="loading-text" class="text-xl font-semibold">Scanning the network...</h3>
          <p class="text-gray-500 mt-2">This usually takes a few seconds</p>
        </div>
      </section>

      <!-- Results -->
      <section id="results-section" class="hidden mt-16 max-w-4xl mx-auto">
        <button id="back-btn" 
                class="flex items-center gap-2 text-gray-500 hover:text-blue-600 mb-6 transition">
          <i data-lucide="arrow-left"></i> Back to Search
        </button>

        <div id="result-found" class="hidden bg-white rounded-3xl shadow border border-gray-100 overflow-hidden">
          <!-- Content filled by JS -->
        </div>

        <div id="result-none" class="hidden text-center py-20 bg-white rounded-3xl shadow border border-gray-100">
          <i data-lucide="search-x" class="w-16 h-16 text-gray-300 mx-auto mb-6"></i>
          <h3 class="text-2xl font-bold">No results found</h3>
          <p class="text-gray-500 mt-2">Try a different address or transaction hash.</p>
        </div>
      </section>
    </main>
  </div>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    const SAMPLE_ADDRESS = "TZDfVdt6pJrAvgzUNXR7VtnGGFwq4Gysnw";
    const searchForm = document.getElementById('search-form');
    const input = document.getElementById('address-input');
    const loadingSection = document.getElementById('loading-section');
    const resultsSection = document.getElementById('results-section');
    const resultFound = document.getElementById('result-found');
    const resultNone = document.getElementById('result-none');
    const searchError = document.getElementById('search-error');
    const backBtn = document.getElementById('back-btn');

    // Price elements
    const priceBtcEl = document.getElementById('price-btc');
    const priceUsdtEl = document.getElementById('price-usdt');

    // Fetch real prices
    async function fetchPrices() {
      try {
        const res = await fetch(
          'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,tether&vs_currencies=usd'
        );
        const data = await res.json();

        const btcPrice = data.bitcoin.usd.toLocaleString();
        const usdtPrice = data.tether.usd.toFixed(4);

        priceBtcEl.innerHTML = `
          <span class="text-emerald-600">BTC</span> 
          <span class="font-semibold">$${btcPrice}</span>
        `;
        priceUsdtEl.innerHTML = `
          <span class="text-blue-600">USDT</span> 
          <span class="font-semibold">$${usdtPrice}</span>
        `;
      } catch (err) {
        console.warn("Price fetch failed", err);
      }
    }

    // Update prices on load and every 30s
    fetchPrices();
    setInterval(fetchPrices, 30000);

    // Mock lookup (replace with real API in production)
    async function lookupQuery(query) {
      await new Promise(r => setTimeout(r, 800));

      const q = query.trim().toLowerCase();
      
      if (q === SAMPLE_ADDRESS.toLowerCase() || q.length > 20) {
        return {
          found: true,
          type: "Address",
          identifier: SAMPLE_ADDRESS,
          network: "TRON (TRC20)",
          balance: "34,872.45 USDT",
          totalReceived: "142,390 USDT",
          totalSent: "107,517.55 USDT",
          txCount: 1247,
          lastActivity: "2 minutes ago",
          status: "Active"
        };
      }
      return { found: false };
    }

    function showError(msg) {
      searchError.textContent = msg;
      searchError.classList.remove('hidden');
      setTimeout(() => searchError.classList.add('hidden'), 5000);
    }

    async function showLoading() {
      loadingSection.classList.remove('hidden');
      await new Promise(r => setTimeout(r, 2200)); // realistic delay
      loadingSection.classList.add('hidden');
    }

    function displayResult(result) {
      resultsSection.classList.remove('hidden');
      resultNone.classList.add('hidden');
      resultFound.classList.remove('hidden');

      resultFound.innerHTML = `
        <div class="bg-gradient-to-r from-blue-50 to-white p-8 border-b">
          <div class="flex justify-between items-start">
            <div>
              <div class="flex items-center gap-3">
                <div class="bg-blue-100 text-blue-600 p-3 rounded-2xl">
                  <i data-lucide="wallet" class="w-8 h-8"></i>
                </div>
                <div>
                  <p class="text-sm text-gray-500">${result.type} • ${result.network}</p>
                  <p class="font-mono text-lg break-all mt-1">${result.identifier}</p>
                </div>
              </div>
            </div>
            <div class="text-right">
              <div class="text-emerald-600 font-semibold text-3xl">${result.balance}</div>
              <div class="text-sm text-gray-500">Balance</div>
            </div>
          </div>
        </div>

        <div class="p-8 grid grid-cols-2 gap-6">
          <div class="bg-gray-50 rounded-2xl p-6">
            <p class="text-gray-500 text-sm">Total Received</p>
            <p class="font-mono text-2xl font-semibold mt-2">${result.totalReceived}</p>
          </div>
          <div class="bg-gray-50 rounded-2xl p-6">
            <p class="text-gray-500 text-sm">Total Sent</p>
            <p class="font-mono text-2xl font-semibold mt-2">${result.totalSent}</p>
          </div>
        </div>

        <div class="px-8 pb-8 grid grid-cols-3 gap-4 text-center">
          <div>
            <p class="text-3xl font-semibold">${result.txCount}</p>
            <p class="text-sm text-gray-500">Transactions</p>
          </div>
          <div>
            <p class="text-3xl font-semibold text-emerald-600">Active</p>
            <p class="text-sm text-gray-500">Status</p>
          </div>
          <div>
            <p class="text-3xl font-semibold">${result.lastActivity}</p>
            <p class="text-sm text-gray-500">Last Activity</p>
          </div>
        </div>
      `;

      lucide.createIcons();
    }

    // Form submit
    searchForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const query = input.value.trim();

      if (!query) {
        showError("Please enter an address or transaction hash.");
        return;
      }

      resultsSection.classList.add('hidden');
      await showLoading();

      const result = await lookupQuery(query);

      if (result.found) {
        displayResult(result);
      } else {
        resultsSection.classList.remove('hidden');
        resultFound.classList.add('hidden');
        resultNone.classList.remove('hidden');
      }
    });

    // Back button
    backBtn.addEventListener('click', () => {
      resultsSection.classList.add('hidden');
      input.focus();
    });

    // Pre-fill demo
    window.addEventListener('load', () => {
      input.value = SAMPLE_ADDRESS;
    });
  </script>
</body>
</html>
